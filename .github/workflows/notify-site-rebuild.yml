name: Notify installguard.dev

# Fires the Cloudflare deploy hook for installguard.dev whenever a
# new GitHub Release is published in this repo. The site fetches the
# latest release tag at build time and bakes it into the homepage
# hero, so this gives us an "instant version flip" the moment a
# release ships.
#
# Required secret: SITE_DEPLOY_HOOK
#   Cloudflare dashboard → Workers & Pages → installguard → Settings
#   → Triggers → Deploy Hooks → copy URL → store here as a repo
#   secret. (Same hook URL as installguard.dev's CF_DEPLOY_HOOK.)

on:
  # Tag push is the source of truth: the Release workflow is also
  # triggered by the same tag, but it publishes the GitHub Release
  # via GITHUB_TOKEN — and events fired by GITHUB_TOKEN do not
  # trigger downstream workflows. So we listen for the tag itself.
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  # Kept for completeness in case a release is ever published
  # manually (which would use a real user token and therefore
  # would trigger this).
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare deploy
        env:
          HOOK: ${{ secrets.SITE_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::SITE_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          curl --fail --silent --show-error -X POST "$HOOK"
          echo
          echo "Deploy hook fired."
