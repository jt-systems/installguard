name: Notify installguard.dev

# Fires the Cloudflare deploy hook for installguard.dev whenever a
# new GitHub Release is published in this repo. The site fetches the
# latest release tag at build time and bakes it into the homepage
# hero, so this gives us an "instant version flip" the moment a
# release ships.
#
# Required secret: SITE_DEPLOY_HOOK
#   Cloudflare dashboard → Workers & Pages → installguard → Settings
#   → Triggers → Deploy Hooks → copy URL → store here as a repo
#   secret. (Same hook URL as installguard.dev's CF_DEPLOY_HOOK.)

on:
  # Primary trigger: fires when the Release workflow completes
  # successfully. By then the GitHub Release object actually exists,
  # so when installguard.dev's RepoStats component queries the GH API
  # for "latest release" during its build, v0.1.N is what comes back.
  #
  # workflow_run is special: it fires regardless of which token
  # triggered the upstream workflow (so it works around the
  # GITHUB_TOKEN-can't-trigger-downstream-workflows guard that
  # blocks `release: published` from reaching us).
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  # Belt-and-braces — kept in case a release is ever published
  # manually (real user token, fires this directly).
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    # When triggered via workflow_run we get the upstream conclusion
    # in github.event.workflow_run.conclusion. Skip the rebuild if the
    # Release workflow itself failed — no point flipping the site to
    # a tag that doesn't have artefacts.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Cloudflare deploy
        env:
          HOOK: ${{ secrets.SITE_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::SITE_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          curl --fail --silent --show-error -X POST "$HOOK"
          echo
          echo "Deploy hook fired."
