# CI — runs on every push and pull request
#
# Jobs:
#   test     — build, test, clippy, fmt check
#   security — cargo-audit dependency advisory scan
#
# Lint, test, and security checks are independent and run in parallel.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build, test, lint ────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        # Pin the installed toolchain to the version in rust-toolchain.toml
        # (1.86.0). Using @stable lets dtolnay install whatever is current
        # stable, after which cargo sees the rust-toolchain.toml pin and
        # tries to invoke rustup to switch — and on the arm64 macos-latest
        # runner image, `rustup` is shadowed by `rustup-init`, which fails
        # with "unexpected argument 'build' found". Pinning the install to
        # match the pin avoids the switch entirely.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.86.0"
          components: clippy, rustfmt

      - name: Bypass rustup proxies
        # The cargo/rustc/clippy/rustfmt binaries in ~/.cargo/bin are rustup
        # proxies that shell out to `rustup run <toolchain> <tool>`. On some
        # runner images (notably arm64 macos-latest) `rustup` itself is a
        # symlink to `rustup-init`, which rejects the proxied subcommand and
        # fails with "unexpected argument 'build' found". Prepending the
        # installed toolchain's real bin directory to PATH skips the proxies
        # entirely and is robust against future image regressions.
        shell: bash
        run: |
          set -euo pipefail
          # Try rustc first; if its proxy is also broken on this image, fall
          # back to globbing the rustup toolchains dir (dtolnay just installed
          # exactly one toolchain so there is no ambiguity).
          toolchain_bin=""
          if sysroot="$(rustc +1.86.0 --print sysroot 2>/dev/null)"; then
            toolchain_bin="$sysroot/bin"
          elif sysroot="$(rustc --print sysroot 2>/dev/null)"; then
            toolchain_bin="$sysroot/bin"
          else
            # Last resort: locate the installed toolchain directly.
            for d in "$HOME"/.rustup/toolchains/1.86.0-*/bin; do
              if [ -x "$d/cargo" ]; then
                toolchain_bin="$d"
                break
              fi
            done
          fi
          if [ -z "$toolchain_bin" ] || [ ! -x "$toolchain_bin/cargo" ]; then
            echo "::error::Could not locate real cargo binary" >&2
            exit 1
          fi
          echo "Using toolchain bin: $toolchain_bin"
          ls -l "$toolchain_bin"
          echo "$toolchain_bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry & build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --locked

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  # ── Dependency advisory scan ─────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo-audit
        run: cargo audit
