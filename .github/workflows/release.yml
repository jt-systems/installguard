# Release — builds static binaries and publishes a GitHub Release
#
# Triggered by a version tag: v*.*.*
#
# Produces:
#   - Static binaries for Linux (x86_64, aarch64), macOS (x86_64, aarch64), Windows (x86_64)
#   - SHA-256 checksums file
#   - SLSA Build Level 3 provenance via slsa-github-generator
#
# Signing and provenance notes:
#   - Binary signing (via cosign) is left as a TODO stub until the keyless
#     workflow is validated against a real release.
#   - SLSA provenance is wired up via the reusable slsa-github-generator
#     workflow; the upload step below feeds the artefact list to it.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write      # create GitHub Release
  id-token: write      # SLSA / keyless signing

jobs:
  # ── Build matrix ──────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Cargo registry & build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/installguard \
             installguard-${{ matrix.target }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item target\${{ matrix.target }}\release\installguard.exe `
                    installguard-${{ matrix.target }}.exe

      - name: Upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: installguard-${{ matrix.target }}*
          if-no-files-found: error

  # ── Checksum & publish ────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: binaries/

      - name: Generate SHA-256 checksums
        working-directory: binaries
        run: sha256sum installguard-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/installguard-*
            binaries/checksums.txt
          generate_release_notes: true

  # ── SLSA provenance (Build Level 3) ──────────────────────────────────────────
  # TODO: wire up once first real release is ready.
  # provenance:
  #   needs: release
  #   uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2
  #   permissions:
  #     actions: read
  #     id-token: write
  #     contents: write
  #   with:
  #     base64-subjects: "<output from release job>"
