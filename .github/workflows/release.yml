# Release — builds static binaries and publishes a GitHub Release
#
# Triggered by a version tag: v*.*.*
#
# Produces, per release:
#   - Static binaries for Linux (x86_64, aarch64), macOS (x86_64, aarch64), Windows (x86_64)
#   - SHA-256 checksums file
#   - One Sigstore (cosign keyless) bundle per binary and one for `checksums.txt`
#   - One SLSA Build Level 3 provenance attestation covering all binaries
#     plus `checksums.txt`, via the slsa-github-generator reusable workflow
#
# Verification (consumer-side):
#   cosign verify-blob \
#     --certificate-identity-regexp '^https://github.com/jt-systems/installguard/\.github/workflows/release\.yml@refs/tags/v.*$' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     --bundle installguard-aarch64-apple-darwin.cosign.bundle \
#     installguard-aarch64-apple-darwin
#
# Pinning notes:
#   The `--certificate-identity-regexp` above accepts any tag from this repo.
#   For stricter pinning, replace `v.*` with the specific tag (e.g. `v0.3.0`).
#   The OIDC issuer is the GitHub Actions token endpoint; it must be passed
#   verbatim — without it, an attacker who can mint *any* Fulcio cert could
#   forge a signature.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write      # create GitHub Release
  id-token: write      # SLSA / keyless signing

jobs:
  # ── Build matrix ──────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Belt-and-braces: dtolnay/rust-toolchain's `targets:` parameter has
      # historically been flaky on cross-arch native builds (e.g. building
      # x86_64-apple-darwin from an arm64 macos-latest runner). Re-running
      # the install through rustup directly is idempotent and guarantees
      # the std component for $matrix.target is present before cargo build.
      - name: Ensure target std installed
        if: "!matrix.cross"
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Cargo registry & build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/installguard \
             installguard-${{ matrix.target }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item target\${{ matrix.target }}\release\installguard.exe `
                    installguard-${{ matrix.target }}.exe

      - name: Upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: installguard-${{ matrix.target }}*
          if-no-files-found: error

  # ── Checksum, sign, and publish ──────────────────────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    # `hashes` is consumed by the SLSA generator job below to build the
    # provenance subjects list. Format: base64(`<sha256>  <filename>\n`...).
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: binaries/

      - name: Generate SHA-256 checksums
        working-directory: binaries
        run: sha256sum installguard-* > checksums.txt

      # Install cosign by SHA-pinned action tag. v3 covers `sign-blob`'s
      # bundle output (no separate `--rekor-url`/`--fulcio-url` needed; the
      # public-good Sigstore endpoints are the defaults).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing: cosign exchanges the ambient GitHub OIDC token for
      # a 10-minute Fulcio code-signing certificate tied to this workflow's
      # identity (`…/release.yml@refs/tags/<TAG>`), signs each artefact,
      # submits the signature + cert to Rekor, and writes a Sigstore bundle
      # (DSSE envelope + cert chain + Rekor inclusion proof) next to the
      # artefact. Verifiers need only the bundle file plus the certificate
      # identity / issuer above.
      - name: Sign binaries and checksums with cosign (keyless)
        working-directory: binaries
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for f in installguard-* checksums.txt; do
            # Skip anything we may have already signed in a previous step
            # (defensive; the matrix produces no `.cosign.bundle` artefacts).
            case "$f" in *.cosign.bundle) continue ;; esac
            echo "::group::cosign sign-blob $f"
            cosign sign-blob \
              --bundle "${f}.cosign.bundle" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
            echo "::endgroup::"
          done

      # Emit the base64-encoded subjects list the SLSA generator wants. We
      # hash the binaries and `checksums.txt`; the cosign bundles are
      # excluded from SLSA subjects (they are themselves attestations of
      # the binaries, not artefacts under attestation).
      - name: Emit SLSA subjects
        id: hash
        working-directory: binaries
        run: |
          set -euo pipefail
          subjects=$(sha256sum installguard-* checksums.txt | base64 -w0)
          echo "hashes=${subjects}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Two non-overlapping globs. `installguard-*` already matches
          # the cosign sidecars for binaries (they're named
          # `installguard-<target>.cosign.bundle` / `.sig` / `.pem`);
          # `checksums.txt*` picks up `checksums.txt` plus its sidecars.
          # Earlier revisions had explicit `*.cosign.bundle` / `*.sig`
          # / `*.pem` lines too, which matched the same binary
          # sidecars a second time and caused softprops to upload
          # them concurrently — hitting "asset already exists" race
          # conditions that occasionally hard-failed the job
          # (v0.3.1).
          files: |
            binaries/installguard-*
            binaries/checksums.txt*
          generate_release_notes: true

  # ── SLSA Build Level 3 provenance ────────────────────────────────────────────
  # Reusable workflow runs on a hardened GitHub-hosted builder, generates a
  # SLSA v1.0 provenance attestation over the subjects emitted above, signs
  # it via the same Fulcio/Rekor path as the binary signatures, and uploads
  # the resulting `*.intoto.jsonl` to the existing release.
  #
  # `permissions` is scoped here, not at workflow level: the reusable
  # workflow refuses to run with broader permissions than it needs.
  provenance:
    name: SLSA L3 provenance
    needs: release
    permissions:
      actions: read       # read this workflow's run metadata
      id-token: write     # mint the OIDC token for Fulcio
      contents: write     # upload the .intoto.jsonl to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      provenance-name: installguard-${{ github.ref_name }}.intoto.jsonl
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}

  # ── Homebrew tap bump ────────────────────────────────────────────────────────
  # Opens a PR against jt-systems/homebrew-installguard bumping the formula's
  # version + four sha256 values to the newly published tag. No-op until
  # HOMEBREW_TAP_TOKEN is configured, so this job is safe to merge before the
  # tap repo exists.
  homebrew:
    name: Bump Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}  # skip pre-release tags (e.g. v0.1.0-alpha.1)
    steps:
      - name: Check tap token availability
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap bump." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out tap repo
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: jt-systems/homebrew-installguard
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download release checksums
        if: steps.gate.outputs.skip != 'true'
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo jt-systems/installguard \
            --pattern checksums.txt \
            --output checksums.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Rewrite formula version and sha256 values
        if: steps.gate.outputs.skip != 'true'
        shell: python
        env:
          FORMULA: tap/Formula/installguard.rb
          CHECKSUMS: checksums.txt
          REF_NAME: ${{ github.ref_name }}
        run: |
          import os, re, sys, pathlib
          version = os.environ["REF_NAME"].lstrip("v")
          formula_path = pathlib.Path(os.environ["FORMULA"])
          src = formula_path.read_text()

          # Bump version
          src, n = re.subn(r'(^\s*version )"[^"]*"', rf'\1"{version}"', src, count=1, flags=re.MULTILINE)
          if n != 1:
              sys.exit("could not find version line in formula")

          # Build {triple: sha256} from checksums.txt
          shas = {}
          for line in pathlib.Path(os.environ["CHECKSUMS"]).read_text().splitlines():
              sha, _, name = line.strip().partition("  ")
              if name.startswith("installguard-"):
                  shas[name[len("installguard-"):]] = sha

          for triple in (
              "aarch64-apple-darwin",
              "x86_64-apple-darwin",
              "aarch64-unknown-linux-musl",
              "x86_64-unknown-linux-musl",
          ):
              sha = shas.get(triple)
              if not sha:
                  sys.exit(f"no sha256 for {triple} in checksums.txt")
              pattern = re.compile(
                  rf'(url "[^"]*installguard-{re.escape(triple)}"\s*\n\s*sha256 ")[0-9a-f]{{64}}(")',
                  re.MULTILINE,
              )
              src, n = pattern.subn(rf'\g<1>{sha}\g<2>', src, count=1)
              if n != 1:
                  sys.exit(f"expected 1 sha256 replacement for {triple}, got {n}")

          formula_path.write_text(src)
          print(f"Rewrote {formula_path} to {version} with {len(shas)} sha256 values")

      - name: Open PR against tap
        if: steps.gate.outputs.skip != 'true'
        working-directory: tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          branch="bump-installguard-$version"
          git config user.name  "installguard-release-bot"
          git config user.email "installguard-release-bot@users.noreply.github.com"
          git checkout -b "$branch"
          git add Formula/installguard.rb
          git commit -m "installguard $version"
          git push -u origin "$branch"
          gh pr create \
            --title "installguard $version" \
            --body "Auto-generated by jt-systems/installguard release workflow for tag ${{ github.ref_name }}." \
            --base main

